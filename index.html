<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a2a4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rozliczenia">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-32.png">
<title>Rozliczenia</title>
<style>
:root {
  --navy: #1a2a4a;
  --navy-light: #243660;
  --navy-dark: #111d33;
  --beige: #f5ebd2;
  --beige-dark: #e8d8b0;
  --beige-text: #c9b98a;
  --white: #ffffff;
  --text: #1a2a4a;
  --text-muted: #6b7a99;
  --border: #e2d9c5;
  --success: #2d7a4f;
  --success-bg: #eaf6ef;
  --danger: #b83232;
  --danger-bg: #fdeaea;
  --warning: #8a6200;
  --warning-bg: #fdf3dc;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 2px 12px rgba(26,42,74,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--beige);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* TOP NAV */
.topnav {
  background: var(--navy);
  color: var(--beige);
  padding: env(safe-area-inset-top, 0) 0 0;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.topnav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
}
.topnav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.topnav-logo svg { width: 26px; height: 26px; }
.topnav h1 { font-size: 17px; font-weight: 600; color: var(--beige); letter-spacing: 0.01em; }
.topnav-sub { font-size: 11px; color: var(--beige-text); letter-spacing: 0.04em; text-transform: uppercase; }

/* STATS BAR */
.stats-bar {
  background: var(--navy-dark);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.stat {
  padding: 10px 8px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.stat:last-child { border-right: none; }
.stat-label { font-size: 10px; color: var(--beige-text); letter-spacing: 0.03em; text-transform: uppercase; margin-bottom: 2px; }
.stat-val { font-size: 13px; font-weight: 600; color: var(--beige); }
.stat-val.danger { color: #f08080; }
.stat-val.success { color: #7dcfa0; }

/* MAIN */
.main { padding: 16px; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0)); }

/* SECTION TITLE */
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin: 0 0 10px;
}

/* MATTER CARDS */
.matter-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.1s;
  box-shadow: var(--shadow);
}
.matter-card:active { transform: scale(0.985); }
.matter-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.matter-client { font-size: 15px; font-weight: 600; }
.matter-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.matter-amounts { display: flex; gap: 16px; margin-top: 10px; }
.amount-item { flex: 1; }
.amount-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.amount-val { font-size: 14px; font-weight: 600; }
.amount-val.danger { color: var(--danger); }
.amount-val.success { color: var(--success); }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--navy-light), var(--navy)); border-radius: 2px; transition: width 0.4s; }

/* BADGES */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.badge.ok { background: var(--success-bg); color: var(--success); }
.badge.partial { background: var(--warning-bg); color: var(--warning); }
.badge.overdue { background: var(--danger-bg); color: var(--danger); }
.badge.none { background: var(--beige); color: var(--text-muted); }

/* NOTE HINT */
.note-hint {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--warning);
  margin-top: 6px;
}

/* FAB */
.fab {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0));
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--navy);
  color: var(--beige);
  border: none;
  cursor: pointer;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 18px rgba(26,42,74,0.35);
  z-index: 40;
  transition: transform 0.15s, background 0.15s;
}
.fab:active { transform: scale(0.92); background: var(--navy-light); }

/* MODAL */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(10,18,35,0.55);
  z-index: 100;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.modal {
  background: var(--white);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: 0;
  max-height: 92dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--white);
  z-index: 2;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-body { padding: 16px 18px; }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--beige);
  border: none;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
}

/* FORM */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field textarea, .field select {
  width: 100%;
  font-size: 15px;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  color: var(--text);
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus { border-color: var(--navy); }
.field textarea { resize: vertical; min-height: 70px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* RATE ROWS */
.rate-section-title {
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin: 18px 0 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.rate-row {
  display: grid;
  grid-template-columns: 1fr 1fr 36px;
  gap: 8px;
  margin-bottom: 8px;
  align-items: end;
}
.rate-row input { font-size: 14px; padding: 9px 10px; }
.del-btn {
  width: 36px; height: 38px;
  background: var(--danger-bg);
  border: none;
  border-radius: var(--radius);
  color: var(--danger);
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}

/* PAYMENTS */
.payment-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.payment-row:last-child { border-bottom: none; }
.pay-date { font-size: 12px; color: var(--text-muted); }
.pay-amount { font-size: 15px; font-weight: 600; color: var(--success); }

/* RATE LIST */
.rate-list-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.rate-list-row:last-child { border-bottom: none; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  color: var(--text);
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s;
}
.btn:active { background: var(--beige); }
.btn.primary {
  background: var(--navy);
  color: var(--beige);
  border-color: var(--navy);
}
.btn.primary:active { background: var(--navy-light); }
.btn.danger { color: var(--danger); border-color: #f5c0c0; }
.btn.danger:active { background: var(--danger-bg); }
.btn.full { width: 100%; justify-content: center; }
.btn.small { padding: 6px 12px; font-size: 13px; }

.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-row .btn { flex: 1; justify-content: center; }

/* DETAIL STATS */
.detail-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.detail-stat { background: var(--beige); border-radius: var(--radius); padding: 10px; text-align: center; }
.detail-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.detail-stat-val { font-size: 15px; font-weight: 700; }

/* ADD PAYMENT INLINE */
.add-payment-row {
  display: grid; grid-template-columns: 1fr 1fr 44px; gap: 8px;
  margin-top: 12px; align-items: end;
}
.add-payment-row input { font-size: 14px; padding: 9px 10px; }
.add-btn {
  width: 44px; height: 38px;
  background: var(--navy);
  border: none;
  border-radius: var(--radius);
  color: var(--beige);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* NOTE BLOCK */
.note-block {
  background: var(--warning-bg);
  border-left: 3px solid #e0b030;
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--warning);
  margin-bottom: 14px;
  line-height: 1.5;
}

/* EMPTY */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.empty p { font-size: 14px; line-height: 1.6; }

/* SECTION */
.sub-section { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 16px 0 8px; }
</style>
</head>
<body>

<nav class="topnav" role="banner">
  <div class="topnav-inner">
    <div class="topnav-logo">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="13" y1="4" x2="13" y2="22" stroke="#f5ebd2" stroke-width="2" stroke-linecap="round"/>
        <line x1="4" y1="9" x2="22" y2="9" stroke="#f5ebd2" stroke-width="2" stroke-linecap="round"/>
        <circle cx="13" cy="5" r="2" fill="#f5ebd2"/>
        <line x1="4" y1="9" x2="6" y2="15" stroke="#f5ebd2" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="4" y1="9" x2="2" y2="15" stroke="#f5ebd2" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M2 15 Q4 17.5 6 15" stroke="#f5ebd2" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="24" y2="15" stroke="#f5ebd2" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="20" y2="15" stroke="#f5ebd2" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M20 15 Q22 17.5 24 15" stroke="#f5ebd2" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <line x1="9" y1="22" x2="17" y2="22" stroke="#f5ebd2" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="topnav h1" style="font-size:17px;font-weight:600;color:#f5ebd2;letter-spacing:0.01em">Rozliczenia</div>
        <div class="topnav-sub">Kancelaria prawna</div>
      </div>
    </div>
  </div>
  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="stat-label">Spraw</div><div class="stat-val" id="st-count">0</div></div>
    <div class="stat"><div class="stat-label">Wartość</div><div class="stat-val" id="st-total">—</div></div>
    <div class="stat"><div class="stat-label">Wpłacono</div><div class="stat-val success" id="st-paid">—</div></div>
    <div class="stat"><div class="stat-label">Pozostało</div><div class="stat-val danger" id="st-rem">—</div></div>
  </div>
</nav>

<main class="main" id="main-content" role="main">
  <div id="list-view"></div>
</main>

<button class="fab" onclick="openNew()" aria-label="Dodaj nową sprawę">+</button>

<div id="modal-bg" class="modal-bg" style="display:none" role="dialog" aria-modal="true">
  <div class="modal" id="modal-panel">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nowa sprawa</span>
      <button class="modal-close" onclick="closeModal()" aria-label="Zamknij">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const KEY = 'kancelaria_v2';
let data = [];

function load() {
  try { const s = localStorage.getItem(KEY); if (s) data = JSON.parse(s); } catch(e) {}
  render();
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
}

function fmt(n) {
  return Number(n).toLocaleString('pl-PL', {minimumFractionDigits: 0, maximumFractionDigits: 0}) + ' zł';
}

function fmtShort(n) {
  const v = Number(n);
  if (v >= 1000) return (v/1000).toLocaleString('pl-PL',{maximumFractionDigits:1}) + 'k';
  return v.toLocaleString('pl-PL') + '';
}

function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('pl-PL', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function paid(m) { return (m.payments||[]).reduce((a,p) => a + Number(p.amount), 0); }
function remaining(m) { return Number(m.total) - paid(m); }

function nextDue(m) {
  const p = paid(m);
  let c = 0;
  const rates = [...(m.rates||[])].sort((a,b) => a.date.localeCompare(b.date));
  for (const r of rates) {
    c += Number(r.amount);
    if (c > p) return r.date;
  }
  return null;
}

function status(m) {
  const rem = remaining(m);
  if (rem <= 0) return 'ok';
  const nd = nextDue(m);
  if (nd && new Date(nd) < new Date()) return 'overdue';
  if (paid(m) > 0) return 'partial';
  return 'none';
}

const statusLabel = { ok:'Zapłacono', partial:'Częściowo', overdue:'Zaległe', none:'Oczekuje' };

function render() {
  let totalAll = 0, paidAll = 0;
  for (const m of data) { totalAll += Number(m.total); paidAll += paid(m); }
  document.getElementById('st-count').textContent = data.length;
  document.getElementById('st-total').textContent = data.length ? fmtShort(totalAll)+' zł' : '—';
  document.getElementById('st-paid').textContent = data.length ? fmtShort(paidAll)+' zł' : '—';
  document.getElementById('st-rem').textContent = data.length ? fmtShort(totalAll-paidAll)+' zł' : '—';

  const el = document.getElementById('list-view');
  if (!data.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">⚖️</div><h2>Brak spraw</h2><p>Kliknij przycisk + aby dodać pierwszą sprawę i klienta.</p></div>`;
    return;
  }
  let html = `<div class="section-title">Aktywne sprawy</div>`;
  for (let i = 0; i < data.length; i++) {
    const m = data[i];
    const p = paid(m), rem = remaining(m), s = status(m);
    const pct = Math.min(100, Math.round((p / Number(m.total)) * 100));
    const nd = nextDue(m);
    const isOverdue = nd && new Date(nd) < new Date();
    html += `<div class="matter-card" onclick="openDetail(${i})" role="button" tabindex="0">
      <div class="matter-card-top">
        <div>
          <div class="matter-client">${esc(m.client)}</div>
          <div class="matter-desc">${esc(m.matter)}</div>
        </div>
        <span class="badge ${s}">${statusLabel[s]}</span>
      </div>
      <div class="matter-amounts">
        <div class="amount-item"><div class="amount-label">Kwota</div><div class="amount-val">${fmt(m.total)}</div></div>
        <div class="amount-item"><div class="amount-label">Wpłacono</div><div class="amount-val success">${fmt(p)}</div></div>
        <div class="amount-item"><div class="amount-label">Pozostało</div><div class="amount-val ${rem>0?'danger':''}">${rem>0?fmt(rem):'—'}</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${nd ? `<div style="font-size:11px;margin-top:6px;color:${isOverdue?'var(--danger)':'var(--text-muted)'}">Kolejny termin: ${fmtDate(nd)}</div>` : ''}
      ${m.note ? `<div class="note-hint">📝 Notatka</div>` : ''}
    </div>`;
  }
  el.innerHTML = html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

function openModal(title, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-bg').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-bg').style.display = 'none';
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

/* ---- FORM ---- */
let _editIdx = -1;
let _formRates = [];

function openNew() {
  _editIdx = -1;
  _formRates = [{ date: '', amount: '' }];
  renderForm({ client:'', matter:'', total:'', note:'' });
}

function renderForm(m) {
  let rateHtml = _formRates.map((r, i) => `
    <div class="rate-row">
      <div><label style="font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;display:block;margin-bottom:4px">Termin</label>
        <input type="date" value="${r.date}" onchange="_formRates[${i}].date=this.value">
      </div>
      <div><label style="font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;display:block;margin-bottom:4px">Kwota (zł)</label>
        <input type="number" placeholder="0" value="${r.amount}" onchange="_formRates[${i}].amount=this.value">
      </div>
      <button class="del-btn" onclick="_formRates.splice(${i},1);renderForm(collectForm())" aria-label="Usuń ratę">✕</button>
    </div>`).join('');

  const body = `
    <div class="row2">
      <div class="field"><label>Klient</label><input id="f-client" value="${esc(m.client)}" placeholder="Imię / firma"></div>
      <div class="field"><label>Kwota (zł)</label><input id="f-total" type="number" value="${m.total||''}" placeholder="0"></div>
    </div>
    <div class="field"><label>Opis sprawy</label><input id="f-matter" value="${esc(m.matter)}" placeholder="Krótki opis"></div>
    <div class="rate-section-title">
      <span>Harmonogram rat / terminów</span>
      <button class="btn small" onclick="_formRates.push({date:'',amount:''});renderForm(collectForm())">+ Dodaj</button>
    </div>
    <div id="rates-area">${rateHtml}</div>
    <div class="field" style="margin-top:14px"><label>Notatka</label><textarea id="f-note" placeholder="Uwagi, szczegóły, informacje...">${esc(m.note||'')}</textarea></div>
    <div class="btn-row" style="margin-top:18px">
      ${_editIdx !== -1 ? `<button class="btn danger" onclick="deleteMatter()">Usuń</button>` : ''}
      <button class="btn primary full" onclick="saveMatter()">Zapisz sprawę</button>
    </div>
    ${_editIdx !== -1 ? '' : ''}
  `;
  openModal(_editIdx === -1 ? 'Nowa sprawa' : 'Edytuj sprawę', body);
}

function collectForm() {
  return {
    client: (document.getElementById('f-client')||{}).value || '',
    matter: (document.getElementById('f-matter')||{}).value || '',
    total: (document.getElementById('f-total')||{}).value || '',
    note: (document.getElementById('f-note')||{}).value || ''
  };
}

function saveMatter() {
  const f = collectForm();
  if (!f.client.trim() || !f.matter.trim() || !parseFloat(f.total)) {
    alert('Uzupełnij klienta, sprawę i kwotę.'); return;
  }
  const obj = {
    client: f.client.trim(),
    matter: f.matter.trim(),
    total: parseFloat(f.total),
    note: f.note.trim(),
    rates: _formRates.filter(r => r.date && r.amount),
    payments: _editIdx === -1 ? [] : data[_editIdx].payments
  };
  if (_editIdx === -1) data.push(obj); else data[_editIdx] = obj;
  save(); render(); closeModal();
}

function deleteMatter() {
  if (!confirm('Usunąć tę sprawę? Tej operacji nie można cofnąć.')) return;
  data.splice(_editIdx, 1);
  save(); render(); closeModal();
}

/* ---- DETAIL ---- */
function openDetail(idx) {
  const m = data[idx];
  const p = paid(m), rem = remaining(m), s = status(m);
  const pct = Math.min(100, Math.round((p / Number(m.total)) * 100));
  const rates = [...(m.rates||[])].sort((a,b) => a.date.localeCompare(b.date));

  let rateHtml = '';
  let cumul = 0;
  for (const r of rates) {
    cumul += Number(r.amount);
    const isPaid = cumul <= p;
    rateHtml += `<div class="rate-list-row">
      <span>${fmtDate(r.date)}</span>
      <span>${fmt(r.amount)}</span>
      <span class="badge ${isPaid?'ok':'none'}">${isPaid?'Opłacona':'Oczekuje'}</span>
    </div>`;
  }

  let payHtml = '';
  const pays = m.payments || [];
  if (!pays.length) payHtml = '<div style="font-size:13px;color:var(--text-muted);padding:6px 0">Brak zarejestrowanych wpłat</div>';
  for (let i = 0; i < pays.length; i++) {
    payHtml += `<div class="payment-row">
      <div><div class="pay-date">${fmtDate(pays[i].date)}</div></div>
      <span class="pay-amount">${fmt(pays[i].amount)}</span>
      <button class="btn small danger" onclick="deletePayment(${idx},${i})">✕</button>
    </div>`;
  }

  const today = new Date().toISOString().slice(0,10);

  const body = `
    <div class="detail-stats">
      <div class="detail-stat"><div class="detail-stat-label">Kwota</div><div class="detail-stat-val">${fmt(m.total)}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">Wpłacono</div><div class="detail-stat-val" style="color:var(--success)">${fmt(p)}</div></div>
      <div class="detail-stat"><div class="detail-stat-label">Pozostało</div><div class="detail-stat-val" style="color:${rem>0?'var(--danger)':'var(--success)'}">${rem>0?fmt(rem):'—'}</div></div>
    </div>
    <div class="progress-bar" style="height:6px;margin-bottom:16px"><div class="progress-fill" style="width:${pct}%"></div></div>

    ${m.note ? `<div class="note-block">📝 ${esc(m.note)}</div>` : ''}

    ${rates.length ? `<div class="sub-section">Harmonogram rat</div><div>${rateHtml}</div>` : ''}

    <div class="sub-section">Wpłaty</div>
    <div id="pays-list">${payHtml}</div>
    <div class="add-payment-row">
      <div><label style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:4px">Data</label>
        <input type="date" id="pay-date" value="${today}">
      </div>
      <div><label style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:4px">Kwota (zł)</label>
        <input type="number" id="pay-amount" placeholder="0">
      </div>
      <button class="add-btn" onclick="addPayment(${idx})" aria-label="Dodaj wpłatę">✓</button>
    </div>

    <div class="btn-row" style="margin-top:20px">
      <button class="btn" onclick="openEdit(${idx})">✏️ Edytuj</button>
      <button class="btn" onclick="closeModal()">Zamknij</button>
    </div>
  `;

  openModal(`${m.client}`, body);
}

function openEdit(idx) {
  _editIdx = idx;
  const m = data[idx];
  _formRates = m.rates && m.rates.length ? [...m.rates] : [{ date:'', amount:'' }];
  renderForm(m);
}

function addPayment(idx) {
  const date = document.getElementById('pay-date').value;
  const amount = parseFloat(document.getElementById('pay-amount').value) || 0;
  if (!date || !amount) { alert('Podaj datę i kwotę wpłaty.'); return; }
  if (!data[idx].payments) data[idx].payments = [];
  data[idx].payments.push({ date, amount });
  save(); render(); openDetail(idx);
}

function deletePayment(idx, pidx) {
  if (!confirm('Usunąć tę wpłatę?')) return;
  data[idx].payments.splice(pidx, 1);
  save(); render(); openDetail(idx);
}

/* ---- PWA ---- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

load();
</script>
</body>
</html>
